kind = "web"
previewPath = "/"
title = "EUI Predictor & Material Recommender"
version = "1.0.0"
id = "artifacts/eui-predictor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25606
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/eui-predictor run dev"

[services.env]
PORT = "25606"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/eui-predictor", "run", "build"]
publicDir = "artifacts/eui-predictor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
